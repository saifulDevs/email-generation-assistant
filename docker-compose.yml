services:
  evaluate:
    build: .
    container_name: email_evaluator
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./reports:/app/reports
    command: python -m src.main

  api:
    build: .
    container_name: email_api
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    command: python -m src.main serve
